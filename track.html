<style>
.page-hero{padding:2.5rem 0;border-bottom:1px solid var(--line);background:var(--bg-alt)}
.page-hero h1{font-size:1.8rem;font-weight:800}
.breadcrumb{color:var(--text-dim);font-size:.85rem;margin-top:.5rem}
.breadcrumb a:hover{color:var(--gold)}

.track-container{max-width:680px;margin:3rem auto}
.search-box{
  display:flex;
  gap:.8rem;
  margin-bottom:2.5rem;
}
.search-box input{
  flex:1;
  padding:1rem 1.3rem;
  font-size:1rem;
}

.order-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:1.6rem;
  margin-bottom:1.2rem;
}
.order-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1.2rem;
  flex-wrap:wrap;
  gap:.7rem;
}
.order-code-text{
  font-family:'Cairo',sans-serif;
  color:var(--gold);
  font-weight:800;
  font-size:1.05rem;
}
.order-date{
  color:var(--text-dim);
  font-size:.88rem;
  margin-bottom:1rem;
}
.order-total{
  color:var(--gold);
  font-weight:700;
  font-family:'Cairo',sans-serif;
}

/* Status Badge */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.4rem .9rem;
  border-radius:999px;
  font-size:.8rem;
  font-weight:700;
}
.status-pending{background:rgba(224,166,60,.15);color:var(--warn)}
.status-confirmed{background:rgba(62,207,142,.15);color:var(--success)}
.status-shipping{background:rgba(58,77,112,.4);color:#9db3e0}
.status-delivered{background:rgba(62,207,142,.25);color:var(--success)}
.status-cancelled{background:rgba(224,85,75,.15);color:var(--danger)}

/* Timeline */
.timeline{
  border-right:2px solid var(--line);
  margin-right:12px;
  padding-right:1.8rem;
  margin-top:1.5rem;
}
.timeline-item{
  position:relative;
  padding-bottom:1.8rem;
}
.timeline-item::before{
  content:'';
  position:absolute;
  right:-1.6rem;
  top:.25rem;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--line);
  border:3px solid var(--bg);
}
.timeline-item.done::before{background:var(--gold)}
.timeline-item b{display:block;font-size:.92rem;margin-bottom:.3rem}
.timeline-item .note{color:var(--text-dim);font-size:.82rem}

/* Tracking Button */
.tracking-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  color:#fff !important;
  padding:.6rem 1.2rem;border-radius:10px;
  font-size:.88rem;font-weight:700;
  text-decoration:none;transition:.2s;margin-top:1rem;
  box-shadow:0 2px 8px rgba(59,130,246,.3);
}
.tracking-btn:hover{
  transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.4);
  text-decoration:none !important;
}
.tracking-btn i{font-size:1.1rem}

.tracking-info-bar{
  background:rgba(59,130,246,.08);
 border:1px solid rgba(59,130,246,.2);
 border-radius:10px;padding:.8rem 1rem;
 margin-top:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;
}
.tracking-info-bar .company-name{font-weight:700;color:#3b82f6;font-size:.9rem}
.tracking-info-bar .tracking-num{font-family:'Cairo',monospace;direction:ltr;text-align:left;color:var(--text)}
</style>
</head>

        <a href="wishlist.html" class="action-btn wishlist-btn-header"><i class='bx bx-heart'></i><span class="wishlist-badge" style="display:none">0</span></a>

<!-- Page Hero -->
<div class="page-hero">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const STATUS_LABELS = {
  pending: "بانتظار مراجعة الدفع",
  confirmed: "تم تأكيد الطلب",
  shipping: "جاري الشحن",
  delivered: "تم التسليم",
  cancelled: "ملغي"
};
const STATUS_ORDER = ["pending", "confirmed", "shipping", "delivered"];

// ====== Tracking URL Helper ======
function getTrackingUrl(company, trackingNumber) {
  if (!trackingNumber) return "#";
  const urls = {
    bosta: `https://bosta.co/ar-eg/tracking-shipments?shipment-number=${trackingNumber}`,
    aramex: `https://www.aramex.com/track/details?ShipmentNumber=${trackingNumber}`,
    smsa: `https://smsaexpress.com/tracking?tracknumbers=${trackingNumber}`,
    dhl: `https://www.dhl.com/eg-en/tracking.html?tracking-id=${trackingNumber}`,
    fedex: `https://www.fedex.com/fedextrack/?trknbr=${trackingNumber}`,
    other: "#"
  };
  return urls[company] || urls.bosta;
}

function getShippingCompanyName(companyKey) {
  const companies = {
    bosta: "بوستا (Bosta)",
    aramex: "أرامكس (Aramex)",
    smsa: "سمسا (SMSA)",
    dhl: "DHL",
    fedex: "FedEx",
    other: "شركة شحن"
  };
  return companies[companyKey] || companyKey;
}

async function doTrack() {
  const q = document.getElementById("trackInput").value.trim();
  const results = document.getElementById("trackResults");
  
  if (!q) { showToast("اكتب رقم الطلب أو رقم الموبايل"); return; }
  
  results.innerHTML = `<div class="loading-state"><i class='bx bx-loader-alt bx-spin' style="font-size:2rem"></i><p style="margin-top:1rem">جاري البحث...</p></div>`;

  try {
    const snap = await db.ref("orders").once("value");
    const all = snap.val() || {};
    
    const matches = Object.entries(all).filter(([id, o]) =>
      o.code === q || (o.customer && o.customer.phone === q)
    );

    if (!matches.length) {
      results.innerHTML = `
        <div class="empty-state">
          <i class='bx bx-search-alt'></i>
          <p>لم يتم العثور على أي طلب بهذه البيانات</p>
        </div>`;
      return;
    }

    results.innerHTML = matches.map(([id, o]) => {
      const cls = o.status === "cancelled" ? "cancelled" : o.status;
      const currentIdx = STATUS_ORDER.indexOf(o.status);
      
      return `
      <div class="order-card">
        <div class="order-header">
          <div>رقم الطلب: <b class="order-code-text">${o.code}</b></div>
          <span class="status-badge status-${cls}">${STATUS_LABELS[o.status] || o.status}</span>
        </div>
        <div class="order-date">
          ${new Date(o.createdAt).toLocaleDateString("ar-EG", {year:'numeric',month:'long',day:'numeric'})} 
          — الإجمالي: <span class="order-total">${fmtPrice(o.total)}</span>
        </div>
        ${o.status === 'shipping' && o.trackingNumber ? `
        <div class="tracking-info-bar">
          <div>
            <div class="company-name"><i class='bx bx-truck'></i> ${getShippingCompanyName(o.shippingCompany)}</div>
            <div class="tracking-num">رقم الشحنة: ${o.trackingNumber}</div>
          </div>
          <a href="${getTrackingUrl(o.shippingCompany, o.trackingNumber)}" target="_blank" rel="noopener" class="tracking-btn">
            <i class='bx bx-target-lock'></i> تتبع طلبك لحظة بلحظة
          </a>
        </div>` : ''}
        ${o.status === "cancelled" ? "" : `
        <div class="timeline">
          ${STATUS_ORDER.map((s, i) => `
            <div class="timeline-item ${i <= currentIdx ? 'done' : ''}">
              <b>${STATUS_LABELS[s]}</b>
              ${i === currentIdx && o.statusHistory && o.statusHistory.length ? 
                `<div class="note">${o.statusHistory[o.statusHistory.length - 1].note || ""}</div>` : ""}
            </div>`).join("")}
        </div>`}
      </div>`;
    }).join("");
    
  } catch (err) {
    showToast("حدث خطأ أثناء البحث");
    results.innerHTML = '<div class="empty-state"><i class="bx bx-error"></i><p>حدث خطأ، حاول مرة أخرى</p></div>';
  }
}

// Enter key support
document.getElementById("trackInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doTrack();
});
</script>
