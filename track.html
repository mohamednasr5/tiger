<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تتبع الطلب | Tiger Jeans</title>
<link rel="shortcut icon" href="images/favicon-32x32.png" type="image/png" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
.page-hero{padding:2.5rem 0;border-bottom:1px solid var(--line);background:var(--bg-alt)}
.page-hero h1{font-size:1.8rem;font-weight:800}
.breadcrumb{color:var(--text-dim);font-size:.85rem;margin-top:.5rem}
.breadcrumb a:hover{color:var(--gold)}

.track-container{max-width:680px;margin:3rem auto}
.search-box{
  display:flex;
  gap:.8rem;
  margin-bottom:2.5rem;
}
.search-box input{
  flex:1;
  padding:1rem 1.3rem;
  font-size:1rem;
}

.order-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:1.6rem;
  margin-bottom:1.2rem;
}
.order-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1.2rem;
  flex-wrap:wrap;
  gap:.7rem;
}
.order-code-text{
  font-family:'Cairo',sans-serif;
  color:var(--gold);
  font-weight:800;
  font-size:1.05rem;
}
.order-date{
  color:var(--text-dim);
  font-size:.88rem;
  margin-bottom:1rem;
}
.order-total{
  color:var(--gold);
  font-weight:700;
  font-family:'Cairo',sans-serif;
}

/* Status Badge */
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.4rem .9rem;
  border-radius:999px;
  font-size:.8rem;
  font-weight:700;
}
.status-pending{background:rgba(224,166,60,.15);color:var(--warn)}
.status-confirmed{background:rgba(62,207,142,.15);color:var(--success)}
.status-shipping{background:rgba(58,77,112,.4);color:#9db3e0}
.status-delivered{background:rgba(62,207,142,.25);color:var(--success)}
.status-cancelled{background:rgba(224,85,75,.15);color:var(--danger)}

/* Timeline */
.timeline{
  border-right:2px solid var(--line);
  margin-right:12px;
  padding-right:1.8rem;
  margin-top:1.5rem;
}
.timeline-item{
  position:relative;
  padding-bottom:1.8rem;
}
.timeline-item::before{
  content:'';
  position:absolute;
  right:-1.6rem;
  top:.25rem;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--line);
  border:3px solid var(--bg);
}
.timeline-item.done::before{background:var(--gold)}
.timeline-item b{display:block;font-size:.92rem;margin-bottom:.3rem}
.timeline-item .note{color:var(--text-dim);font-size:.82rem}
</style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="container">
    <div class="header-main">
      <a href="index.html" class="logo">
        <span class="logo-icon">Z</span>
        <div class="logo-text"><strong>TIGER JEANS</strong><small>متجر فخم</small></div>
      </a>
      <nav class="main-nav">
        <a href="index.html">الرئيسية</a>
        <a href="index.html#products">المتجر</a>
        <a href="track.html" class="active">تتبع الطلب</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="action-btn cart-btn"><i class='bx bx-cart-alt'></i><span class="cart-badge" style="display:none">0</span></a>
      </div>
    </div>
  </div>
</header>

<!-- Page Hero -->
<div class="page-hero">
  <div class="container">
    <h1>تتبع طلبك</h1>
    <div class="breadcrumb"><a href="index.html">الرئيسية</a> / تتبع الطلب</div>
  </div>
</div>

<!-- Track Content -->
<div class="container">
  <div class="track-container">
    <div class="search-box">
      <input id="trackInput" placeholder="أدخل رقم الطلب (مثال: TJ-123456) أو رقم الموبايل" />
      <button class="btn-primary" onclick="doTrack()">بحث</button>
    </div>
    <div id="trackResults"></div>
  </div>
</div>

<!-- Footer -->
<footer class="site-footer">
  <div class="container footer-bottom">
    <p>جميع الحقوق محفوظة © Tiger Jeans 2026 | تطوير <span class="credit">المهندس محمد حماد</span></p>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/config.js"></script>
<script>
const STATUS_LABELS = {
  pending: "بانتظار مراجعة الدفع",
  confirmed: "تم تأكيد الطلب",
  shipping: "جاري الشحن",
  delivered: "تم التسليم",
  cancelled: "ملغي"
};
const STATUS_ORDER = ["pending", "confirmed", "shipping", "delivered"];

async function doTrack() {
  const q = document.getElementById("trackInput").value.trim();
  const results = document.getElementById("trackResults");
  
  if (!q) { showToast("اكتب رقم الطلب أو رقم الموبايل"); return; }
  
  results.innerHTML = '<div class="loading-state"><i class='bx bx-loader-alt bx-spin' style="font-size:2rem"></i><p style="margin-top:1rem">جاري البحث...</p></div>';

  try {
    const snap = await db.ref("orders").once("value");
    const all = snap.val() || {};
    
    const matches = Object.entries(all).filter(([id, o]) =>
      o.code === q || (o.customer && o.customer.phone === q)
    );

    if (!matches.length) {
      results.innerHTML = `
        <div class="empty-state">
          <i class='bx bx-search-alt'></i>
          <p>لم يتم العثور على أي طلب بهذه البيانات</p>
        </div>`;
      return;
    }

    results.innerHTML = matches.map(([id, o]) => {
      const cls = o.status === "cancelled" ? "cancelled" : o.status;
      const currentIdx = STATUS_ORDER.indexOf(o.status);
      
      return `
      <div class="order-card">
        <div class="order-header">
          <div>رقم الطلب: <b class="order-code-text">${o.code}</b></div>
          <span class="status-badge status-${cls}">${STATUS_LABELS[o.status] || o.status}</span>
        </div>
        <div class="order-date">
          ${new Date(o.createdAt).toLocaleDateString("ar-EG", {year:'numeric',month:'long',day:'numeric'})} 
          — الإجمالي: <span class="order-total">${fmtPrice(o.total)}</span>
        </div>
        ${o.status === "cancelled" ? "" : `
        <div class="timeline">
          ${STATUS_ORDER.map((s, i) => `
            <div class="timeline-item ${i <= currentIdx ? 'done' : ''}">
              <b>${STATUS_LABELS[s]}</b>
              ${i === currentIdx && o.statusHistory && o.statusHistory.length ? 
                `<div class="note">${o.statusHistory[o.statusHistory.length - 1].note || ""}</div>` : ""}
            </div>`).join("")}
        </div>`}
      </div>`;
    }).join("");
    
  } catch (err) {
    showToast("حدث خطأ أثناء البحث");
    results.innerHTML = '<div class="empty-state"><i class="bx bx-error"></i><p>حدث خطأ، حاول مرة أخرى</p></div>';
  }
}

// Enter key support
document.getElementById("trackInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doTrack();
});
</script>
</body>
</html>
