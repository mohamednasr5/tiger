<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>المفضلة | Tiger Jeans</title>

<style>
.page-hero{padding:2.5rem 0;border-bottom:1px solid var(--line);background:var(--bg-alt)}
.page-hero h1{font-size:1.8rem;font-weight:800}
.breadcrumb{color:var(--text-dim);font-size:.85rem;margin-top:.5rem}
.breadcrumb a:hover{color:var(--gold)}
.wishlist-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1.5rem;
  padding:3rem 0;
}
.wl-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease;
}
.wl-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px -20px rgba(0,0,0,.55)}
.wl-card .wl-image{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--surface-2)}
.wl-card .wl-image img{width:100%;height:100%;object-fit:cover;transition:.5s}
.wl-card:hover .wl-image img{transform:scale(1.08)}
.wl-remove{
  position:absolute;top:.6rem;left:.6rem;width:34px;height:34px;border-radius:50%;
  background:rgba(10,10,12,.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
  color:#fff;transition:.2s;z-index:2;
}
.wl-remove:hover{background:var(--danger);color:#fff;transform:scale(1.1)}
.wl-body{padding:1.1rem;display:flex;flex-direction:column;gap:.6rem;flex:1}
.wl-body h4{font-size:.98rem;font-weight:600;min-height:2.4em}
.wl-price{color:var(--gold);font-weight:800;font-family:'Cairo',sans-serif;font-size:1.05rem}
@media(max-width:1024px){.wishlist-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.wishlist-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.wishlist-grid{grid-template-columns:1fr}}
</style>
</head>

        <a href="wishlist.html" class="action-btn wishlist-btn-header active"><i class='bx bxs-heart'></i><span class="wishlist-badge" style="display:none">0</span></a>
        <a href="cart.html" class="action-btn cart-btn"><i class='bx bx-cart-alt'></i><span class="cart-badge" style="display:none">0</span></a>

<!-- Wishlist Content -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>
<script>
function renderWishlist() {
  const list = getWishlist();
  const grid = document.getElementById("wishlistGrid");

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class='bx bx-heart'></i>
        <p>قائمة المفضلة فارغة حالياً</p>
        <a href="/" class="btn-primary" style="margin-top:1.2rem">تصفح المنتجات</a>
      </div>`;
    return;
  }

  grid.innerHTML = list
    .map((item, i) => `
    <div class="wl-card reveal in">
      <div class="wl-image">
        <button class="wl-remove" onclick="removeItem('${item.id}')" title="إزالة"><i class='bx bx-x'></i></button>
        <a href="product.html?id=${item.id}">
          <img src="${item.image || "images/product-1.png"}" alt="${item.name}" />
        </a>
      </div>
      <div class="wl-body">
        <h4><a href="product.html?id=${item.id}">${item.name}</a></h4>
        <div class="wl-price">${fmtPrice(item.price)}</div>
        <button class="btn-primary full-width" style="margin-top:auto" onclick="moveToCart('${item.id}')"><i class='bx bx-cart-add'></i> أضف إلى السلة</button>
      </div>
    </div>`)
    .join("");
}

function removeItem(id) {
  removeFromWishlist(id);
  renderWishlist();
  showToast("تمت الإزالة من المفضلة");
}

function moveToCart(id) {
  const item = getWishlist().find((w) => w.id === id);
  if (!item) return;
  addToCart({ id: item.id, name: item.name, price: item.price, image: item.image, size: "", color: "", qty: 1 });
}

renderWishlist();
</script>
