<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Tiger Jeans</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

    <!-- القائمة الجانبية (Sidebar) -->
    <aside class="sidebar">
        <div class="logo">
            <h1>TIGER <span>ADMIN</span></h1>
        </div>
        <nav class="admin-nav">
            <a href="#" class="active">📦 إضافة منتج جديد</a>
            <a href="#">📋 إدارة المنتجات</a>
            <a href="#">🛒 الطلبات الواردة</a>
            <a href="index.html" class="back-link">🔙 العودة للمتجر</a>
        </nav>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="admin-content">
        <header class="admin-header">
            <h2>إضافة منتج جديد</h2>
            <div id="adminUser">جاري التحقق...</div>
        </header>

        <section class="admin-panel">
            <form id="addProductForm" class="admin-form">
                
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="prodName" required placeholder="مثال: جاكيت جلد أسود">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>السعر الحالي (ج.م) *</label>
                        <input type="number" id="prodPrice" required placeholder="850">
                    </div>
                    <div class="form-group">
                        <label>السعر القديم (اختياري)</label>
                        <input type="number" id="prodOldPrice" placeholder="1200">
                    </div>
                </div>

                <div class="form-group">
                    <label>المقاسات المتاحة (افصل بينها بفاصلة) *</label>
                    <input type="text" id="prodSizes" required placeholder="S, M, L, XL, XXL أو 30, 32, 34">
                </div>

                <div class="form-group">
                    <label>صورة المنتج (يتم رفعها لـ R2) *</label>
                    <input type="file" id="prodImage" accept="image/*" required>
                    <div class="image-preview" id="imagePreview">سيتم عرض معاينة الصورة هنا</div>
                </div>

                <div class="form-group">
                    <label>كلمة مرور الرفع (Admin Token) *</label>
                    <input type="password" id="adminToken" required placeholder="أدخل رمز الحماية السري">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary btn-block">
                    رفع وحفظ المنتج
                </button>
                <div id="statusMessage" class="status-message"></div>
            </form>
        </section>
    </main>

    <!-- سكريبت الإدارة -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
