# ═══════════════════════════════════════════════════════════════
#  TIGER Image Upload Worker — wrangler.toml
# ═══════════════════════════════════════════════════════════════
#
#  Setup Steps:
#  1. Create R2 bucket:  wrangler r2 bucket create tiger-images
#  2. Set admin secret:  wrangler secret put ADMIN_SECRET
#  3. Deploy worker:     wrangler deploy
#  4. (Optional) Add custom domain for R2: images.tiger-jeans.com
# ═══════════════════════════════════════════════════════════════

name = "tiger-upload"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket Binding ──
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "tiger-images"

# ── Environment Variables ──
[vars]
ALLOWED_ORIGINS = "https://tiger-jeans.com,https://www.tiger-jeans.com"

# ── Secrets (set via: wrangler secret put ADMIN_SECRET) ──
# ADMIN_SECRET = "your-secure-secret-key-here"

# ── Custom Domain (optional) ──
# [routes]
# pattern = "upload.tiger-jeans.com/*"
# zone_name = "tiger-jeans.com"

# ── Production Environment ──
[env.production]
name = "tiger-upload"
[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "tiger-images"

# ── Staging Environment ──
[env.staging]
name = "tiger-upload-staging"
[[env.staging.r2_buckets]]
binding = "BUCKET"
bucket_name = "tiger-images-staging"