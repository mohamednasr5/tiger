<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>أوبس! الصفحة احترقت 🔥 | Tiger Jeans</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<style>
:root {
  --gold: #d4af37;
  --gold-light: #f5d97c;
  --bg-dark: #0a0a0f;
  --fire-orange: #ff6b35;
  --fire-red: #ef4444;
  --fire-yellow: #fbbf24;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', 'Cairo', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ====== BACKGROUND ====== */
.bg-glow {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center bottom, rgba(255,107,53,0.1) 0%, transparent 60%);
  pointer-events:none;
  animation:bgPulse 3s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from{ opacity:0.5; }
  to{ opacity:1; }
}

/* ====== FLOATING EMBERS ====== */
.embers-container {
  position:fixed; inset:0;
  pointer-events:none; overflow:hidden;
  z-index:1;
}
.ember {
  position:absolute;
  width:8px; height:8px;
  background:var(--fire-orange);
  border-radius:50%;
  box-shadow:0 0 12px var(--fire-orange), 0 0 24px var(--fire-red);
  animation:emberFloat linear infinite;
  opacity:0;
}
@keyframes emberFloat {
  0%{ transform:translateY(100vh) scale(0) rotate(0deg); opacity:0; }
  10%{ opacity:1; }
  90%{ opacity:.7; }
  100%{ transform:translateY(-20vh) scale(0) rotate(720deg); opacity:0; }
}

/* ====== MAIN CONTAINER ====== */
.container {
  text-align:center;
  z-index:10;
  padding:2rem;
  max-width:650px;
}

/* ====== SCENE WITH REAL IMAGES ====== */
.scene {
  position:relative;
  width:400px;
  height:420px;
  margin:0 auto 2rem;
}

/* Jeans Image Container */
.jeans-container {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:3;
}

.jeans-img {
  width:280px;
  height:auto;
  filter:drop-shadow(0 15px 40px rgba(0,0,0,0.6));
  transition:filter 0.3s ease;
  animation:jeansShake 0.5s ease-in-out infinite;
}

.burned .jeans-img {
  filter:drop-shadow(0 15px 40px rgba(0,0,0,0.6)) brightness(0.85) sepia(0.3);
}

@keyframes jeansShake {
  0%,100%{ transform:translateX(0) rotate(0); }
  25%{ transform:translateX(-2px) rotate(-0.5deg); }
  75%{ transform:translateX(2px) rotate(0.5deg); }
}

/* Burn overlay on jeans */
.burn-overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:140px;
  height:120px;
  background:radial-gradient(ellipse at center,
    rgba(30,20,10,0.9) 0%,
    rgba(80,40,20,0.7) 40%,
    rgba(139,69,19,0.5) 60%,
    transparent 80%
  );
  border-radius:50%;
  pointer-events:none;
  animation:burnFlicker 0.3s ease-in-out infinite alternate;
  opacity:0;
  transition:opacity 0.5s ease;
}
.burned .burn-overlay { opacity:1; }

@keyframes burnFlicker {
  from{ transform:translate(-50%, -50%) scale(1); opacity:0.9; }
  to{ transform:translate(-50%, -50%) scale(1.05); opacity:1; }
}

/* Fire glow around burn area */
.fire-glow {
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%, -50%);
  width:180px;
  height:160px;
  background:radial-gradient(ellipse at center,
    rgba(255,107,53,0.4) 0%,
    rgba(239,68,68,0.2) 30%,
    transparent 70%
  );
  border-radius:50%;
  pointer-events:none;
  animation:glowPulse 0.8s ease-in-out infinite alternate;
  opacity:0;
  transition:opacity 0.5s ease;
}
.burned .fire-glow { opacity:1; }

@keyframes glowPulse {
  from{ transform:translate(-50%, -50%) scale(1); opacity:0.6; }
  to{ transform:translate(-50%, -50%) scale(1.15); opacity:1; }
}

/* Fire particles */
.fire-particles {
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%, -50%);
  pointer-events:none;
  width:160px;
  height:120px;
}

.fire-particle {
  position:absolute;
  background:var(--fire-orange);
  border-radius:50%;
  animation:fireDance 0.5s ease-in-out infinite alternate;
  box-shadow:0 0 15px var(--fire-orange), 0 0 25px var(--fire-red);
  opacity:0;
}
.burned .fire-particle { opacity:1; }

.fire-particle:nth-child(1){ 
  top:20%; left:20%; width:14px; height:14px; 
  animation-delay:0s; background:var(--fire-yellow);
}
.fire-particle:nth-child(2){ 
  top:30%; left:70%; width:18px; height:18px; 
  animation-delay:0.12s; background:var(--fire-orange);
}
.fire-particle:nth-child(3){ 
  top:50%; left:40%; width:22px; height:22px; 
  animation-delay:0.08s; background:var(--fire-red);
}
.fire-particle:nth-child(4){ 
  top:60%; left:65%; width:12px; height:12px; 
  animation-delay:0.2s; background:var(--fire-yellow);
}
.fire-particle:nth-child(5){ 
  top:35%; left:50%; width:16px; height:16px; 
  animation-delay:0.15s; background:var(--fire-orange);
}

@keyframes fireDance {
  from{ transform:scale(1) translateY(0); }
  to{ transform:scale(1.4) translateY(-15px); }
}

/* Smoke effect */
.smoke-container {
  position:absolute;
  top:35%;
  left:50%;
  transform:translateX(-50%);
  pointer-events:none;
  width:200px;
  height:150px;
}

.smoke {
  position:absolute;
  bottom:0;
  width:40px; height:40px;
  background:radial-gradient(circle, rgba(150,150,150,0.4) 0%, transparent 70%);
  border-radius:50%;
  animation:smokeRise 2.5s ease-out infinite;
  opacity:0;
}
.burned .smoke { opacity:1; }

.smoke:nth-child(1){ left:-20px; animation-delay:0s; width:35px; height:35px; }
.smoke:nth-child(2){ left:20px; animation-delay:0.4s; width:50px; height:50px; }
.smoke:nth-child(3){ left:60px; animation-delay:0.9s; width:40px; height:40px; }
.smoke:nth-child(4){ left:100px; animation-delay:1.3s; width:55px; height:55px; }
.smoke:nth-child(5){ left:140px; animation-delay:1.8s; width:38px; height:38px; }

@keyframes smokeRise {
  0%{ transform:translateY(0) scale(0.5) translateX(0); opacity:0; }
  15%{ opacity:0.5; }
  50%{ opacity:0.3; transform:translateY(-80px) scale(1.5) translateX(10px); }
  100%{ transform:translateY(-150px) scale(2.5) translateX(-15px); opacity:0; }
}

/* Iron Container */
.iron-container {
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  cursor:pointer;
}

.iron-img {
  width:260px;
  height:auto;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5));
  transform-origin: center right;
  animation:ironPress 2s ease-in-out infinite;
  transition:transform 0.3s ease;
}

.iron-container:hover .iron-img {
  animation-play-state:paused;
  transform:rotate(-25deg) scale(1.05);
}

@keyframes ironPress {
  0%,100%{ transform:rotate(-20deg) translateY(0); }
  45%{ transform:rotate(-23deg) translateY(15px); }
  55%{ transform:rotate(-23deg) translateY(15px); }
}

/* Iron heat glow */
.iron-heat-glow {
  position:absolute;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  height:60px;
  background:radial-gradient(ellipse at top,
    rgba(255,107,53,0.6) 0%,
    rgba(239,68,68,0.3) 30%,
    transparent 70%
  );
  pointer-events:none;
  animation:heatGlow 0.6s ease-in-out infinite alternate;
}

@keyframes heatGlow {
  from{ opacity:0.6; transform:translateX(-50%) scaleY(1); }
  to{ opacity:1; transform:translateX(-50%) scaleY(1.3); }
}

/* Steam holes light */
.steam-indicator {
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.steam-dot {
  width:6px; height:6px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:steamDot 1s ease-in-out infinite alternate;
}
.steam-dot:nth-child(2){ animation-delay:0.2s; }
.steam-dot:nth-child(3){ animation-delay:0.4s; }

@keyframes steamDot {
  from{ opacity:0.2; transform:scale(0.8); }
  to{ opacity:0.6; transform:scale(1.2); }
}

/* ====== TEXT CONTENT ====== */
.error-code {
  font-family:'Cairo', sans-serif;
  font-size:8rem; font-weight:900;
  background:linear-gradient(135deg, var(--fire-orange), var(--fire-red), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  animation:errorPulse 2s ease-in-out infinite;
}
@keyframes errorPulse {
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

.main-message {
  font-family:'Cairo', sans-serif;
  font-size:1.7rem; font-weight:800;
  color:#fff;
  margin:1rem 0 .8rem;
  line-height:1.6;
}

.sub-message {
  font-size:1.05rem; color:#9ca3af;
  line-height:1.9;
  margin-bottom:1.5rem;
}

.highlight {
  color:var(--fire-orange);
  font-weight:700;
}

/* ====== COUNTDOWN TIMER ====== */
.countdown-box {
  display:inline-flex; align-items:center; gap:1rem;
  background:rgba(255,107,53,0.08);
  border:1px dashed rgba(255,107,53,0.3);
  padding:1.2rem 2.2rem;
  border-radius:18px;
  margin:1.5rem 0;
}

.countdown-label {
  color:#9ca3af; font-size:.95rem;
}

.countdown-number {
  font-family:'Cairo', monospace;
  font-size:2.8rem; font-weight:900;
  color:var(--fire-orange);
  min-width:55px;
  animation:numberTick 1s ease-in-out;
}
@keyframes numberTick {
  0%{ transform:scale(1.3); }
  100%{ transform:scale(1); }
}

/* ====== HOME BUTTON ====== */
.home-btn {
  display:inline-flex; align-items:center; gap:.6rem;
  padding:1.1rem 2.6rem;
  background:linear-gradient(135deg, var(--gold), #b8962e);
  color:#000; text-decoration:none;
  border-radius:16px; font-family:'Cairo', sans-serif;
  font-weight:800; font-size:1.05rem;
  transition:all .3s ease;
  box-shadow:0 10px 35px rgba(212,175,55,0.35);
  animation:btnFloat 2.5s ease-in-out infinite;
}
.home-btn:hover {
  transform:translateY(-4px) scale(1.06);
  box-shadow:0 15px 45px rgba(212,175,55,0.45);
}
@keyframes btnFloat {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}

/* ====== FUNNY TAGS ====== */
.tags-container {
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:.7rem; margin-top:2rem;
}
.tag {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:.55rem 1.1rem; border-radius:22px;
  font-size:.84rem; color:#9ca3af;
  transition:all .3s ease;
}
.tag:hover {
  background:rgba(212,175,55,0.12);
  border-color:rgba(212,175,55,0.35);
  color:var(--gold);
  transform:translateY(-2px);
}

/* ====== BRAND FOOTER ====== */
.brand-footer {
  position:fixed; bottom:1.5rem;
  left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:.5rem;
  color:#9ca3af; font-size:.85rem;
  z-index:10;
}
.brand-footer i { color:var(--gold); }

/* ====== SCREEN SHAKE ON LOAD ====== */
.screen-shake {
  animation:screenShake 0.8s ease-in-out;
}
@keyframes screenShake {
  0%,100%{ transform:translateX(0); }
  10%,30%,50%,70%,90%{ transform:translateX(-6px); }
  20%,40%,60%,80%{ transform:translateX(6px); }
}

/* ====== RESPONSIVE ====== */
@media(max-width:500px) {
  .scene { transform:scale(0.78); }
  .error-code { font-size:5.5rem; }
  .main-message { font-size:1.3rem; }
  .sub-message { font-size:.92rem; }
  .countdown-number { font-size:2.2rem; }
  .home-btn { padding:.9rem 2rem; font-size:.95rem; }
  .tags-container { gap:.5rem; }
  .tag { font-size:.78rem; padding:.45rem .9rem; }
}

/* ====== SPARK EFFECTS ====== */
.spark {
  position:absolute;
  width:8px; height:8px;
  background:var(--fire-yellow);
  border-radius:50%;
  pointer-events:none;
  animation:sparkFly 0.7s ease-out forwards;
  box-shadow:0 0 10px currentColor;
}
</style>
</head>
<body class="screen-shake">

<!-- Background Glow -->
<div class="bg-glow"></div>

<!-- Embers -->
<div class="embers-container" id="embersContainer"></div>

<!-- Main Container -->
<div class="container">

  <!-- Scene with Real Images -->
  <div class="scene" id="scene">
    
    <!-- Iron (Mienta 2300W) -->
    <div class="iron-container">
      <img src="images/iron-404.png" alt="Mienta Iron" class="iron-img" id="ironImg" />
      <div class="iron-heat-glow"></div>
      <div class="steam-indicator">
        <div class="steam-dot"></div>
        <div class="steam-dot"></div>
        <div class="steam-dot"></div>
      </div>
    </div>

    <!-- Smoke Effect -->
    <div class="smoke-container">
      <div class="smoke"></div>
      <div class="smoke"></div>
      <div class="smoke"></div>
      <div class="smoke"></div>
      <div class="smoke"></div>
    </div>

    <!-- Jeans -->
    <div class="jeans-container" id="jeansContainer">
      <img src="images/jeans-404.png" alt="Jeans" class="jeans-img" />
      
      <!-- Burn Effects Overlay -->
      <div class="burn-overlay"></div>
      <div class="fire-glow"></div>
      
      <!-- Fire Particles -->
      <div class="fire-particles">
        <div class="fire-particle"></div>
        <div class="fire-particle"></div>
        <div class="fire-particle"></div>
        <div class="fire-particle"></div>
        <div class="fire-particle"></div>
      </div>
    </div>

  </div>

  <!-- Error Code -->
  <div class="error-code">404</div>

  <!-- Main Message -->
  <h1 class="main-message">يا سلام! 🤦‍♂️</h1>
  
  <p class="sub-message">
    الصفحة اللي طلبتها ربما <span class="highlight">احترقت مع البنطلون</span> لحظات... 🔥<br>
    المكواة <strong style="color:#ef4444">Mienta 2300W</strong> كانت شغالة والبنطلون انصهر! 👖➡️🔥
  </p>

  <!-- Countdown Timer -->
  <div class="countdown-box">
    <span class="countdown-label">هتحول تلقائياً لصفحة المتجر الرئيسية خلال</span>
    <span class="countdown-number" id="countdown">10</span>
    <span class="countdown-label">ثواني ⏰</span>
  </div>

  <!-- Home Button -->
  <a href="https://tiger-jeans.com/" class="home-btn">
    <i class='bx bx-home'></i> روح للصفحة الرئيسية
  </a>

  <!-- Funny Tags -->
  <div class="tags-container">
    <span class="tag">👖 البنطلون ضحية</span>
    <span class="tag">🔥 النار مشيت</span>
    <span class="tag">⚡ المكواة برة</span>
    <span class="tag">💨 الدخان طالع</span>
    <span class="tag">😂 الحمدلله سلامة</span>
  </div>

</div>

<!-- Brand Footer -->
<div class="brand-footer">
  <i class='bx bx-shield-quarter'></i> Tiger Jeans © 2026
</div>

<script>
// ====== TRIGGER BURN ANIMATION AFTER LOAD ======
window.addEventListener('load', () => {
  setTimeout(() => {
    // Add burned class to trigger all fire effects
    document.getElementById('jeansContainer').classList.add('burned');
    document.getElementById('scene').classList.add('burned');
    
    // Make iron press harder
    const iron = document.getElementById('ironImg');
    iron.style.animation = 'ironPressHard 2s ease-in-out infinite';
  }, 800);
});

// Add harder pressing animation after burn starts
const hardPressStyle = document.createElement('style');
hardPressStyle.textContent = `
  @keyframes ironPressHard {
    0%,100%{ transform:rotate(-22deg) translateY(0); }
    40%{ transform:rotate(-26deg) translateY(25px); }
    60%{ transform:rotate(-26deg) translateY(25px); }
  }
`;
document.head.appendChild(hardPressStyle);

// ====== COUNTDOWN TIMER ======
let seconds = 10;
const countdownEl = document.getElementById('countdown');

const countdownInterval = setInterval(() => {
  seconds--;
  if (seconds <= 0) {
    clearInterval(countdownInterval);
    countdownEl.textContent = '✓';
    window.location.href = 'https://tiger-jeans.com/';
  } else {
    countdownEl.textContent = seconds;
    countdownEl.style.animation = 'none';
    void countdownEl.offsetWidth; // Trigger reflow
    countdownEl.style.animation = 'numberTick 1s ease-in-out';
  }
}, 1000);

// ====== GENERATE EMBERS ======
const embersContainer = document.getElementById('embersContainer');
for (let i = 0; i < 35; i++) {
  const ember = document.createElement('div');
  ember.className = 'ember';
  ember.style.left = Math.random() * 100 + '%';
  ember.style.animationDuration = (4 + Math.random() * 7) + 's';
  ember.style.animationDelay = (Math.random() * 10) + 's';
  ember.style.width = (4 + Math.random() * 8) + 'px';
  ember.style.height = ember.style.width;
  
  const colors = ['#ff6b35', '#ef4444', '#fbbf24', '#d4af37', '#ff8c00', '#ffa500'];
  ember.style.background = colors[Math.floor(Math.random() * colors.length)];
  ember.style.boxShadow = `0 0 ${10 + Math.random() * 15}px ${ember.style.background}`;
  
  embersContainer.appendChild(ember);
}

// ====== RANDOM SPARKS FROM BURN AREA ======
setInterval(() => {
  if (Math.random() > 0.5 && document.querySelector('.burned')) {
    const scene = document.getElementById('scene');
    const spark = document.createElement('div');
    spark.className = 'spark';
    
    const colors = ['#ff6b35', '#fbbf24', '#ef4444', '#fff'];
    spark.style.background = colors[Math.floor(Math.random() * colors.length)];
    
    // Position near the burn area (center of jeans)
    spark.style.left = (170 + Math.random() * 60) + 'px';
    spark.style.top = (220 + Math.random() * 60) + 'px';
    
    scene.appendChild(spark);
    setTimeout(() => spark.remove(), 700);
  }
}, 300);

// ====== GIFT CARD REDIRECT DETECTION ======
(function checkGiftCardRedirect() {
  const path = window.location.pathname;
  const giftCardMatch = path.match(/\/gift-card\/([a-zA-Z0-9_-]+)/);
  
  if (giftCardMatch) {
    const cardId = giftCardMatch[1];
    
    // Update message for gift card users
    document.querySelector('.main-message').textContent = 'بطاقة الهدايا متخبية! 🎁';
    document.querySelector('.sub-message').innerHTML = `
      بنحاول نلبسلك البطاقة دي... استنى شوية! 🎉<br>
      <span style="color:var(--gold)">الرابط:</span> 
      <code style="background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:6px;font-size:.9rem">${cardId}</code>
    `;
    
    // Redirect faster for gift cards
    clearInterval(countdownInterval);
    let gcSeconds = 4;
    countdownEl.textContent = gcSeconds;
    
    const gcInterval = setInterval(() => {
      gcSeconds--;
      if (gcSeconds <= 0) {
        clearInterval(gcInterval);
        window.location.href = `gift-card.html?id=${cardId}`;
      } else {
        countdownEl.textContent = gcSeconds;
        countdownEl.style.animation = 'none';
        void countdownEl.offsetWidth;
        countdownEl.style.animation = 'numberTick 1s ease-in-out';
      }
    }, 1000);
  }
})();

// ====== CONSOLE EASTER EGG ======
console.log('%c🔥 يا سلام! البنطلون احترق!', 'font-size:28px;color:#ff6b35;font-weight:bold;');
console.log('%c👖 المكواة Mienta 2300W كانت شغالة والصفحة فازت...', 'font-size:14px;color:#9ca3af;');
console.log('%c⚡ الحل: اضغط على "روح للصفحة الرئيسية"', 'font-size:13px;color:#d4af37;');
</script>
</body>
</html>
