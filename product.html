<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تفاصيل المنتج | Tiger Jeans</title>
<meta name="description" content="تصفح تفاصيل المنتج، المقاسات، الألوان والأسعار على متجر تايجر جينز - أفضل بناطيل الجينز والملابس العصرية في مصر." />
<meta name="robots" content="index, follow" />
<link rel="shortcut icon" href="images/favicon-32x32.png" type="image/png" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
.page-hero{padding:2rem 0;border-bottom:1px solid var(--line);background:var(--bg-alt)}
.breadcrumb{color:var(--text-dim);font-size:.85rem}
.breadcrumb a:hover{color:var(--gold)}
.product-detail{
  display:grid;
  grid-template-columns:.9fr 1.1fr;
  gap:3rem;
  padding:3rem 0;
}

/* Gallery */
.pd-gallery .main-image{
  aspect-ratio:3/4;
  border-radius:16px;
  overflow:hidden;
  background:var(--surface);
  margin-bottom:1rem;
  position:relative;
}
.pd-gallery .main-image img{
  width:100%;height:100%;
  object-fit:cover;
  transition:.4s;
}
.pd-gallery .main-image:hover img{transform:scale(1.03)}
.pd-thumbs{
  display:flex;
  gap:.7rem;
  flex-wrap:wrap;
}
.pd-thumbs img{
  width:75px;height:88px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
  opacity:.5;
  transition:.2s;
}
.pd-thumbs img:hover,
.pd-thumbs img.active{
  border-color:var(--gold);
  opacity:1;
}

/* Product Info */
.pd-info h1{font-size:1.85rem;font-weight:800;margin-bottom:.8rem;line-height:1.4}
.pd-price-row{
  display:flex;
  align-items:center;
  gap:1rem;
  margin-bottom:1.5rem;
  flex-wrap:wrap;
}
.pd-current-price{
  font-size:1.8rem;
  color:var(--gold);
  font-weight:800;
  font-family:'Cairo',sans-serif;
}
.pd-old-price{
  color:var(--text-dim);
  text-decoration:line-through;
  font-size:1.1rem;
}
.pd-discount-badge{
  background:linear-gradient(135deg,#ff4757,#ff6b81);
  color:#fff;
  padding:.25rem .7rem;
  border-radius:6px;
  font-weight:700;
  font-size:.82rem;
  font-family:'Cairo',sans-serif;
}
.pd-description{
  color:var(--text-dim);
  line-height:1.9;
  margin-bottom:2rem;
  font-size:.95rem;
}

/* Options */
.option-group{margin-bottom:1.6rem}
.option-group label{
  display:block;
  font-weight:700;
  margin-bottom:.7rem;
  font-size:.95rem;
}
.option-list{
  display:flex;
  gap:.65rem;
  flex-wrap:wrap;
}
.option-btn{
  padding:.6rem 1.2rem;
  border:2px solid var(--line);
  border-radius:8px;
  font-weight:600;
  font-size:.9rem;
  cursor:pointer;
  transition:.2s;
  background:var(--surface);
  color:var(--text-dim);
}
.option-btn:hover{border-color:var(--gold-deep)}
.option-btn.active{
  border-color:var(--gold);
  background:rgba(212,175,55,.1);
  color:var(--gold);
}

/* Quantity */
.qty-row{
  display:flex;
  align-items:center;
  gap:1.2rem;
  margin-bottom:2rem;
}
.qty-row label{font-weight:700;font-size:.95rem}
.qty-box{
  display:flex;
  align-items:center;
  border:2px solid var(--line);
  border-radius:8px;
  overflow:hidden;
}
.qty-box button{
  width:42px;height:42px;
  background:var(--surface);
  font-weight:800;
  font-size:1.1rem;
  transition:.2s;
}
.qty-box button:hover{background:var(--gold);color:#000}
.qty-box span{
  width:50px;text-align:center;
  font-weight:700;
  font-family:'Cairo',sans-serif;
  font-size:1.05rem;
}

/* Actions */
.pd-actions{
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
}
@media(max-width:900px){.product-detail{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="container">
    <div class="header-main">
      <a href="index.html" class="logo">
        <img src="images/logo-icon.png" class="logo-icon" alt="Tiger Jeans" />
        <div class="logo-text"><strong>TIGER JEANS</strong><small>لأرقى الملابس العالمية</small></div>
      </a>
      <nav class="main-nav">
        <a href="index.html">الرئيسية</a>
        <a href="index.html#products">المتجر</a>
        <a href="track.html">تتبع الطلب</a>
      </nav>
      <div class="header-actions">
        <a href="orders.html" class="action-btn" title="طلباتي"><i class='bx bx-receipt'></i></a>
        <a href="wishlist.html" class="action-btn wishlist-btn-header"><i class='bx bx-heart'></i><span class="wishlist-badge" style="display:none">0</span></a>
        <a href="cart.html" class="action-btn cart-btn"><i class='bx bx-cart-alt'></i><span class="cart-badge" style="display:none">0</span></a>
      </div>
    </div>
  </div>
</header>

<!-- Breadcrumb -->
<div class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">الرئيسية</a> / <span id="crumbName">منتج</span></div>
  </div>
</div>

<!-- Product Detail -->
<div class="container">
  <div class="product-detail" id="pdDetail">
    <div class="loading-state">جاري التحميل...</div>
  </div>
</div>

<!-- Footer -->
<footer class="site-footer">
  <div class="container footer-bottom">
    <p>جميع الحقوق محفوظة © Tiger Jeans 2026 | تطوير
        <a href="https://www.facebook.com/en.mohamed.nasr" target="_blank" rel="noopener" class="credit-link">
          <i class='bx bxs-code-alt'></i> المهندس محمد حماد
        </a>
      </p>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/admin-enhancements.js"></script>
<script>
const params = new URLSearchParams(location.search);
const pid = params.get("id");
let PRODUCT = null;
let selSize = "", selColor = "", selColorImage = "", qty = 1;
let productStock = {}; // Store stock data for this product
let currentStockQty = 0; // Current stock for selected size/color

// Colors can be plain strings (legacy products) or {name, image} objects (new products with optional per-color image)
function colorName(c) { return typeof c === "string" ? c : (c.name || ""); }
function colorImage(c) { return typeof c === "string" ? "" : (c.image || ""); }

// Guesses which size-guide tab fits this product based on its name/category text
function guessSizeGuideCategory() {
  const text = ((PRODUCT.category || "") + " " + (PRODUCT.name || "")).toLowerCase();
  if (text.includes("تيشرت") || text.includes("تي شيرت") || text.includes("t-shirt") || text.includes("tshirt")) return "tshirt1";
  if (text.includes("سليم") || text.includes("slim")) return "slimfit";
  if (text.includes("جينز") && (text.includes("طويل") || text.includes("أطوال") || text.includes("طول خاص"))) return "jeansTall";
  if (text.includes("جينز") || text.includes("jeans")) return "jeans";
  if (text.includes("قميص") || text.includes("قمصان") || text.includes("shirt")) return "shirts";
  return "shirts";
}

if (!pid) {
  document.getElementById("pdDetail").innerHTML = '<div class="empty-state"><i class="bx bx-error-circle"></i><p>المنتج غير موجود</p></div>';
} else {
  db.ref("products/" + pid).once("value").then((snap) => {
    PRODUCT = snap.val();
    if (!PRODUCT) {
      document.getElementById("pdDetail").innerHTML = '<div class="empty-state"><i class="bx bx-error-circle"></i><p>المنتج غير موجود</p></div>';
      return;
    }
    
    selSize = (PRODUCT.sizes && PRODUCT.sizes[0]) || "";
    selColor = (PRODUCT.colors && PRODUCT.colors.length) ? colorName(PRODUCT.colors[0]) : "";
    selColorImage = (PRODUCT.colors && PRODUCT.colors.length) ? colorImage(PRODUCT.colors[0]) : "";
    
    document.getElementById("crumbName").textContent = PRODUCT.name || "منتج";
    document.title = (PRODUCT.name || "منتج") + " | تايجر جينز";
    applyProductSeo(PRODUCT, pid);
    
    // Load stock data
    loadProductStock(pid);
    
    render();
  });
}

// Load stock for this product
function loadProductStock(productId) {
  db.ref(`products/${productId}/stock`).once("value").then((snap) => {
    productStock = snap.val() || {};
    updateStockDisplay();
  }).catch(() => {
    productStock = {};
  });
}

// Update stock display based on selected size/color
function updateStockDisplay() {
  if (!selSize || !selColor) return;
  
  const key = `${selSize}_${selColor}`;
  currentStockQty = productStock[key] || 0;
  
  // Update stock indicator
  const stockEl = document.getElementById('stockIndicator');
  if (stockEl) {
    if (currentStockQty <= 0) {
      stockEl.innerHTML = '<span style="color:#ff4757;font-weight:700"><i class="bx bx-x-circle"></i> غير متوفر حالياً</span>';
      stockEl.className = 'stock-indicator out-of-stock';
    } else if (currentStockQty <= 5) {
      stockEl.innerHTML = `<span style="color:#ffa502;font-weight:700"><i class="bx bx-error"></i> يتبقى ${currentStockQty} قطع فقط!</span>`;
      stockEl.className = 'stock-indicator low-stock';
    } else {
      stockEl.innerHTML = `<span style="color:#2ed573;font-weight:700"><i class="bx bx-check-circle"></i> متوفر (${currentStockQty} قطعة)</span>`;
      stockEl.className = 'stock-indicator in-stock';
    }
  }
  
  // Update add to cart / pre-order button
  updateActionButton();
}

// Update action button based on stock
function updateActionButton() {
  const actionDiv = document.getElementById('actionButtonContainer');
  if (!actionDiv) return;
  
  if (currentStockQty <= 0) {
    actionDiv.innerHTML = `
      <button class="btn-primary" style="flex:1;justify-content:center;padding:1rem;background:linear-gradient(135deg,#ff6b81,#ff4757)" onclick="openPreorderModal('${pid}', '${PRODUCT?.name || ''}', '${selSize}', '${selColor}')">
        <i class='bx bx-time-five'></i> طلب مسبق
      </button>
      <button class="btn-secondary wishlist-btn" data-id="${pid}" style="padding:1rem 1.2rem" onclick="toggleWishlistDetail()" id="pdWishlistBtn">
        <i class='${isWishlisted(pid) ? "bx bxs-heart" : "bx bx-heart"}'></i>
      </button>
      <a href="cart.html" class="btn-secondary" style="padding:1rem 1.5rem">السلة</a>
    `;
  } else {
    actionDiv.innerHTML = `
      <button class="btn-primary" style="flex:1;justify-content:center;padding:1rem" onclick="addToCartNow()">
        <i class='bx bx-cart-add'></i> أضف إلى السلة
      </button>
      <button class="btn-secondary wishlist-btn" data-id="${pid}" style="padding:1rem 1.2rem" onclick="toggleWishlistDetail()" id="pdWishlistBtn">
        <i class='${isWishlisted(pid) ? "bx bxs-heart" : "bx bx-heart"}'></i>
      </button>
      <a href="cart.html" class="btn-secondary" style="padding:1rem 1.5rem">السلة</a>
    `;
  }
}

// Fills in per-product SEO: meta description, canonical URL, Open Graph tags,
// and a Product structured-data block so Google/Bing can show rich results
// (price, availability, image) for this specific product page.
function applyProductSeo(p, id) {
  const name = p.name || "منتج";
  const desc = (p.description && p.description.trim())
    ? p.description.trim().slice(0, 160)
    : `${name} من تايجر جينز - جودة عالية وأسعار منافسة، شحن سريع لجميع محافظات مصر.`;
  const url = `https://tiger-jeans.com/product.html?id=${id}`;
  const img = (p.images && p.images[0]) ? `https://tiger-jeans.com/${p.images[0]}` : "https://tiger-jeans.com/images/icon-512.png";

  const setMeta = (selector, attr, value) => {
    const el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  };

  let descTag = document.querySelector('meta[name="description"]');
  if (descTag) descTag.setAttribute("content", desc);

  let canonical = document.querySelector('link[rel="canonical"]');
  if (!canonical) {
    canonical = document.createElement("link");
    canonical.rel = "canonical";
    document.head.appendChild(canonical);
  }
  canonical.href = url;

  const ogTags = {
    "og:type": "product",
    "og:title": `${name} | تايجر جينز`,
    "og:description": desc,
    "og:url": url,
    "og:image": img
  };
  Object.entries(ogTags).forEach(([prop, content]) => {
    let tag = document.querySelector(`meta[property="${prop}"]`);
    if (!tag) {
      tag = document.createElement("meta");
      tag.setAttribute("property", prop);
      document.head.appendChild(tag);
    }
    tag.setAttribute("content", content);
  });

  const ld = document.createElement("script");
  ld.type = "application/ld+json";
  ld.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Product",
    "name": name,
    "image": img,
    "description": desc,
    "sku": id,
    "brand": { "@type": "Brand", "name": "Tiger Jeans" },
    "offers": {
      "@type": "Offer",
      "url": url,
      "priceCurrency": "EGP",
      "price": p.price || 0,
      "availability": p.active !== false ? "https://schema.org/InStock" : "https://schema.org/OutOfStock",
      "itemCondition": "https://schema.org/NewCondition"
    }
  });
  document.head.appendChild(ld);
}

function render() {
  const images = (PRODUCT.images && PRODUCT.images.length) ? PRODUCT.images : ["images/product-1.png"];
  
  // Calculate discount if old price exists
  let discountBadge = "";
  if (PRODUCT.oldPrice && PRODUCT.price < PRODUCT.oldPrice) {
    const discPercent = Math.round((1 - PRODUCT.price / PRODUCT.oldPrice) * 100);
    discountBadge = `<span class="pd-discount-badge">${discPercent}%-</span>`;
  }
  
  document.getElementById("pdDetail").innerHTML = `
    <!-- Gallery -->
    <div class="pd-gallery">
      <div class="main-image">
        <img id="mainImage" src="${selColorImage || images[0]}" alt="${PRODUCT.name}" />
      </div>
      <div class="pd-thumbs">
        ${images.map((img, i) => `<img src="${img}" class="${(!selColorImage && i === 0) ? 'active' : ''}" onclick="switchImage('${img}', this)" alt="" />`).join("")}
      </div>
    </div>
    
    <!-- Info -->
    <div class="pd-info">
      <h1>${PRODUCT.name}</h1>
      
      <div class="pd-price-row">
        <span class="pd-current-price">${fmtPrice(PRODUCT.price)}</span>
        ${PRODUCT.oldPrice ? `<span class="pd-old-price">${fmtPrice(PRODUCT.oldPrice)}</span>` : ""}
        ${discountBadge}
      </div>
      
      ${PRODUCT.description ? `<p class="pd-description">${PRODUCT.description}</p>` : ""}
      
      ${PRODUCT.sizes && PRODUCT.sizes.length ? `
      <div class="option-group">
        <label style="display:flex;align-items:center;justify-content:space-between;gap:.6rem">
          <span>المقاس</span>
          <a href="size-guide.html?cat=${guessSizeGuideCategory()}" target="_blank" style="font-size:.8rem;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:.3rem"><i class='bx bx-ruler'></i> مش عارف مقاسك؟ اضغط هنا</a>
        </label>
        <div class="option-list" id="sizeList">
          ${PRODUCT.sizes.map(s => `<button class="option-btn ${s === selSize ? 'active' : ''}" onclick="pickSize('${s}', this)">${s}</button>`).join("")}
        </div>
      </div>` : ""}
      
      ${PRODUCT.colors && PRODUCT.colors.length ? `
      <div class="option-group">
        <label>اللون</label>
        <div class="option-list" id="colorList">
          ${PRODUCT.colors.map(c => `<button class="option-btn ${colorName(c) === selColor ? 'active' : ''}" data-img="${colorImage(c)}" onclick="pickColor('${colorName(c)}', '${colorImage(c)}', this)">${colorImage(c) ? `<img src="${colorImage(c)}" alt="" style="width:18px;height:18px;border-radius:50%;object-fit:cover;margin-inline-end:.35rem;vertical-align:middle" />` : ""}${colorName(c)}</button>`).join("")}
        </div>
      </div>` : ""}
      
      <!-- Stock Indicator -->
      <div id="stockIndicator" style="margin-bottom:1rem;padding:.8rem;background:var(--bg-alt);border-radius:10px;text-align:center;border:1px solid var(--line)">
        <span style="color:var(--text-dim)">جاري التحقق من المخزون...</span>
      </div>
      
      <div class="qty-row">
        <label>الكمية</label>
        <div class="qty-box">
          <button onclick="changeQty(-1)">−</button>
          <span id="qtyValue">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
      </div>
      
      <div class="pd-actions" id="actionButtonContainer">
        <button class="btn-primary" style="flex:1;justify-content:center;padding:1rem" onclick="addToCartNow()">
          <i class='bx bx-cart-add'></i> أضف إلى السلة
        </button>
        <button class="btn-secondary wishlist-btn" data-id="${pid}" style="padding:1rem 1.2rem" onclick="toggleWishlistDetail()" id="pdWishlistBtn">
          <i class='${isWishlisted(pid) ? "bx bxs-heart" : "bx bx-heart"}'></i>
        </button>
        <a href="cart.html" class="btn-secondary" style="padding:1rem 1.5rem">السلة</a>
      </div>
    </div>
  `;
}

function switchImage(src, el) {
  document.getElementById("mainImage").src = src;
  document.querySelectorAll(".pd-thumbs img").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
}

function pickSize(s, el) {
  selSize = s;
  document.querySelectorAll("#sizeList .option-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  // Update stock display for new size
  updateStockDisplay();
}

function pickColor(c, img, el) {
  selColor = c;
  selColorImage = img || "";
  document.querySelectorAll("#colorList .option-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  
  // Show the color-specific image if one was set; otherwise fall back to the product's general image
  const images = (PRODUCT.images && PRODUCT.images.length) ? PRODUCT.images : ["images/product-1.png"];
  const mainImg = document.getElementById("mainImage");
  if (mainImg) mainImg.src = selColorImage || images[0];
  document.querySelectorAll(".pd-thumbs img").forEach((t, i) => t.classList.toggle("active", !selColorImage && i === 0));
  
  // Update stock display for new color
  updateStockDisplay();
}

function changeQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById("qtyValue").textContent = qty;
}

function addToCartNow() {
  addToCart({
    id: pid,
    name: PRODUCT.name,
    price: PRODUCT.price,
    image: selColorImage || (PRODUCT.images && PRODUCT.images[0]) || "",
    size: selSize,
    color: selColor,
    qty
  });
}

function toggleWishlistDetail() {
  if (!PRODUCT) return;
  const added = toggleWishlistItem({
    id: pid,
    name: PRODUCT.name,
    price: PRODUCT.price,
    image: (PRODUCT.images && PRODUCT.images[0]) || ""
  });
  const btn = document.getElementById("pdWishlistBtn");
  if (btn) {
    btn.querySelector("i").className = added ? "bx bxs-heart" : "bx bx-heart";
    btn.classList.toggle("active", added);
  }
  showToast(added ? "تمت الإضافة إلى المفضلة ♥" : "تمت الإزالة من المفضلة");
}
</script>
