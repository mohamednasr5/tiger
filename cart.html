<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سلة المشتريات | Tiger Jeans</title>
<link rel="shortcut icon" href="images/favicon-32x32.png" type="image/png" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
.cart-wrap{display:grid;grid-template-columns:1fr .4fr;gap:2rem;padding:3rem 0}
.cline{display:flex;gap:1.2rem;padding:1.2rem 0;border-bottom:1px solid var(--line)}
.cline img{width:90px;height:105px;object-fit:cover;border-radius:10px;background:var(--surface)}
.cline .info{flex:1}
.cline h4{font-size:1rem;margin-bottom:.4rem}
.cline .meta{color:var(--text-dim);font-size:.82rem;margin-bottom:.7rem}
@media(max-width:900px){.cart-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="site">
  <div class="container nav">
    <a href="index.html" class="brand"><i class='bx bxs-t-shirt tiger-mark'></i> Tiger <span style="color:var(--gold)">Jeans</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">الرئيسية</a>
      <a href="index.html#shop">المتجر</a>
      <a href="track.html">تتبع الطلب</a>
    </nav>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn active"><i class='bx bx-cart'></i><span class="badge cart-badge" style="display:none">0</span></a>
      <div class="burger" onclick="document.getElementById('navLinks').classList.toggle('show')"><i class='bx bx-menu'></i></div>
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1>سلة المشتريات</h1>
    <div class="breadcrumb"><a href="index.html">الرئيسية</a> / السلة</div>
  </div>
</div>

<div class="container">
  <div class="cart-wrap">
    <div id="cartList"></div>
    <div class="card" style="height:fit-content">
      <h3 style="margin-bottom:1.2rem">ملخص الطلب</h3>
      <div class="summary-row"><span>عدد القطع</span><span id="sumCount">0</span></div>
      <div class="summary-row total"><span>الإجمالي</span><span id="sumTotal">0 جنيه</span></div>
      <a href="checkout.html" class="btn" style="width:100%;margin-top:1.2rem;justify-content:center" id="checkoutBtn">إتمام الشراء <i class='bx bx-left-arrow-alt'></i></a>
      <a href="index.html" class="btn ghost" style="width:100%;margin-top:.7rem;justify-content:center">متابعة التسوق</a>
    </div>
  </div>
</div>

<footer class="site">
  <div class="container foot-bottom">جميع الحقوق محفوظة © Tiger Jeans 2026 &nbsp;|&nbsp; تطوير <span class="credit">المهندس محمد حماد</span></div>
</footer>

<script src="js/config.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const list = document.getElementById("cartList");
  if (!cart.length) {
    list.innerHTML = `<div class="empty-state"><i class='bx bx-cart'></i><p>سلتك فارغة حالياً</p><a href="index.html" class="btn" style="margin-top:1rem">تصفح المنتجات</a></div>`;
    document.getElementById("checkoutBtn").style.pointerEvents = "none";
    document.getElementById("checkoutBtn").style.opacity = ".5";
  } else {
    list.innerHTML = cart
      .map(
        (item, i) => `
      <div class="cline">
        <img src="${item.image || "images/product-1.png"}" />
        <div class="info">
          <h4>${item.name}</h4>
          <div class="meta">${item.size ? "المقاس: " + item.size : ""} ${item.color ? " | اللون: " + item.color : ""}</div>
          <div class="qty-ctrl">
            <button onclick="changeQ(${i}, -1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQ(${i}, 1)">+</button>
            <span class="rm" style="margin-right:1rem;cursor:pointer" onclick="removeItem(${i})"><i class='bx bx-trash'></i> إزالة</span>
          </div>
        </div>
        <div class="price">${fmtPrice(item.price * item.qty)}</div>
      </div>`
      )
      .join("");
  }
  document.getElementById("sumCount").textContent = cartCount();
  document.getElementById("sumTotal").textContent = fmtPrice(cartTotal());
}

function changeQ(i, d) {
  const cart = getCart();
  updateCartQty(i, cart[i].qty + d);
  renderCart();
}
function removeItem(i) {
  removeFromCart(i);
  renderCart();
}
renderCart();
</script>
</body>
</html>
